<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robinhood Rug Analyzer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="eyebrow">Public Web Data Risk Screen</p>
      <h1>Robinhood Rug Analyzer</h1>
      <p class="description">Enter a token contract address to fetch public market and honeypot data, then generate a transparent heuristic rug-risk score.</p>
      <form id="analyze-form">
        <label for="contract-address">Token Contract Address</label>
        <input id="contract-address" name="contractAddress" type="text" placeholder="0x..." required />
        <button type="submit">Analyze Token</button>
      </form>
      <div id="result" class="result">Waiting for input...</div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
