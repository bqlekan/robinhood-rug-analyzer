<!DOCTYPE html>
<html lang="en">
<head>

  <title>Robinhood Rug Analyzer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="eyebrow">Project Architecture Preview</p>
      <h1>Robinhood Rug Analyzer</h1>

        <input id="contract-address" name="contractAddress" type="text" placeholder="0x..." required />

      </form>
      <pre id="result" class="result">Waiting for input...</pre>
    </section>
  </main>
  <script src="app.js"></script>
